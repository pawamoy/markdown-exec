[project]
site_name = "Markdown Exec"
site_description = "Utilities to execute code blocks in Markdown files."
site_author = "Timothée Mazzucotelli"
site_url = "https://pawamoy.github.io/markdown-exec"
repo_url = "https://github.com/pawamoy/markdown-exec"
repo_name = "pawamoy/markdown-exec"
edit_uri = "edit/main/docs/"
copyright = "Copyright &copy; 2022 Timothée Mazzucotelli"
extra_css = ["css/apidocs.css"]
extra_javascript = ["js/feedback.js"]
nav = [
  { "Home" = [
    { "Overview" = "index.md" },
    { "Changelog" = "changelog.md" },
    { "Credits" = "credits.md" },
    { "License" = "license.md" },
  ] },
  { "Usage" = [
      "usage/index.md",
      { "Python" = "usage/python.md" },
      { "Pyodide" = "usage/pyodide.md" },
      { "Shell" = "usage/shell.md" },
      { "Tree" = "usage/tree.md" },
  ] },
  { "Gallery" = "gallery.md" },
  { "API reference" = "reference/api.md" },
  { "Development" = [
    { "Contributing" = "contributing.md" },
    { "Code of Conduct" = "code_of_conduct.md" },
  ] },
  { "Author's website" = "https://pawamoy.github.io" },
]

# ----------------------------------------------------------------------------
# Theme configuration
# ----------------------------------------------------------------------------
[project.theme]
custom_dir = "docs/.overrides"
language = "en"
features = [
    "announce.dismiss",
    "content.action.edit",
    "content.action.view",
    "content.code.annotate",
    "content.code.copy",
    "content.code.select",
    "content.footnote.tooltips",
    "content.tabs.link",
    "content.tooltips",
    "navigation.footer",
    "navigation.indexes",
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.path",
    "navigation.sections",
    "navigation.tabs",
    "navigation.tabs.sticky",
    "navigation.top",
    "search.highlight",
    "toc.follow",
]

[[project.theme.palette]]
media = "(prefers-color-scheme)"
toggle.icon = "material/brightness-auto"
toggle.name = "Switch to light mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
primary = "teal"
accent = "purple"
toggle.icon = "material/weather-sunny"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
primary = "black"
accent = "lime"
toggle.icon = "material/weather-night"
toggle.name = "Switch to system preference"

[project.theme.icon]
logo = "material/currency-sign"

# ----------------------------------------------------------------------------
# Social configuration
# ----------------------------------------------------------------------------
[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/pawamoy"

[[project.extra.social]]
icon = "fontawesome/brands/mastodon"
link = "https://fosstodon.org/@pawamoy"

[[project.extra.social]]
icon = "fontawesome/brands/twitter"
link = "https://twitter.com/pawamoy"

[[project.extra.social]]
icon = "fontawesome/brands/gitter"
link = "https://gitter.im/markdown-exec/community"

[[project.extra.social]]
icon = "fontawesome/brands/python"
link = "https://pypi.org/project/markdown-exec/"

[project.extra.analytics.feedback]
title = "Was this page helpful?"

[[project.extra.analytics.feedback.ratings]]
icon = "material/emoticon-happy-outline"
name = "This page was helpful"
data = 1
note = "Thank you for your feedback!"

[[project.extra.analytics.feedback.ratings]]
icon = "material/emoticon-sad-outline"
name = "This page could be improved"
data = 0
note = "Let us know how we can improve this page."

# ----------------------------------------------------------------------------
# Markdown extensions configuration
# ----------------------------------------------------------------------------
[project.markdown_extensions.abbr]
[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.callouts]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.toc]
permalink = "¤"
[project.markdown_extensions.pymdownx.arithmatex]
generic = true
[project.markdown_extensions.pymdownx.betterem]
smart_enable = "all"
[project.markdown_extensions.pymdownx.blocks.admonition]
[project.markdown_extensions.pymdownx.blocks.details]
[project.markdown_extensions.pymdownx.blocks.tab]
[project.markdown_extensions.pymdownx.caret]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.emoji]
emoji_generator = "zensical.extensions.emoji.to_svg"
emoji_index = "zensical.extensions.emoji.twemoji"
[project.markdown_extensions.pymdownx.highlight]
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.keys]
[project.markdown_extensions.pymdownx.magiclink]
[project.markdown_extensions.pymdownx.mark]
[project.markdown_extensions.pymdownx.smartsymbols]
[project.markdown_extensions.pymdownx.snippets]
base_path = [".", "docs/snippets"]
check_paths = true
[project.markdown_extensions.pymdownx.superfences]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true
[project.markdown_extensions.pymdownx.tilde]
[project.markdown_extensions.zensical.extensions.preview]
configurations = [{targets.include = ["reference/api.md"]}]

# ----------------------------------------------------------------------------
# Plugins configuration
# ----------------------------------------------------------------------------
[project.plugins.mkdocstrings.handlers.python]
paths = ["src"]
inventories = ["https://docs.python.org/3/objects.inv"]

[project.plugins.mkdocstrings.handlers.python.options]
backlinks = "tree"
docstring_options = { "ignore_init_summary" = true }
docstring_section_style = "list"
filters = "public"
heading_level = 1
inherited_members = true
merge_init_into_class = true
parameter_headings = true
separate_signature = true
show_root_heading = true
show_root_full_path = false
show_signature_annotations = true
show_source = true
show_symbol_type_heading = true
show_symbol_type_toc = true
signature_crossrefs = true
summary = true
unwrap_annotated = true

[project.plugins.markdown-exec]
ansi = "required"
